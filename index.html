<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Coffee House</title>
</head>

<body>
    <div class="container-principal">


        <aside class="perfil-sidebar">
            <div class="info-empresa">
                <img src="assetes/coffeHouse.png" alt="Logo" class="logo">
                <h1 class="nome-empresa">CoffeeHouse</h1>
            </div>


            <div class="status-usuario">
                <p>Olá, <span id="nome-usuario">admin</span></p>
                <button id="btn-logout">Sair</button>
            </div>

            <div class="metricas">

                <p>Pedidos: <span id="qtd-pedidos">0</span></p>
                <p>Total: R$ <span id="total-compras">0.00</span></p>
                <button id="btn-aba-pedir">Pedir</button>
            </div>


            <div id="container-cadastro-atividade" class="hide">
                <h2 class="titulo-cadastro">Meus pedidos</h2>
                <form id="form-cadastro-atividade">
                    <div class="form-group">
                        <label>Tipo de Atividade</label>
                        <select id="cad-tipo" required>
                            <option value="cafe">café</option>
                            <option value="lanches">Lanches</option>
                            <option value="sobremesas">sobremesas</option>
                        </select>
                        <span class="error-msg"></span>
                    </div>
                    <div class="form-group">
                        <label>Quantidade</label>
                        <input type="number" id="cad-quantidade" placeholder="Ex: 2" required>
                        <span class="error-msg"></span>
                    </div>
                    <div class="form-group">
                        <label>Tempo (minutos)</label>
                        <input type="number" id="cad-tempo" placeholder="Ex: 5" required>
                        <span class="error-msg"></span>
                    </div>
                    <button type="submit" id="btn-salvar-pedido">Pedir</button>
                </form>
            </div>

            <footer class="rodape-perfil">
                <span>CoffeeHouse</span>
                <div class="redes-sociais">
                    <img src="assetes/instagram.png" alt="Instagram">
                    <img src="assetes/twitter.png" alt="Twitter">
                    <img src="assetes/tik_tok.png" alt="TikTok">
                </div>
                <small>Copyright-2024</small>
            </footer>
        </aside>


        <main class="conteudo-principal">

            <nav class="filtros-categorias">
                <button class="filtro-btn active" data-categoria="cafe">Café</button>
                <button class="filtro-btn" data-categoria="lanches">Lanches</button>
                <button class="filtro-btn" data-categoria="sobremesas">Sobremesas</button>
            </nav>

            <section class="lista-atividades">

                <article class="card-produto" data-id="1">
                    <div class="produto-header">
                        <div class="titulo-icone">
                            <span class="emoji-produto">☕</span>
                            <h3>Cappuccino</h3>
                        </div>


                        <div class="interacoes-sociais">
                            <button class="btn-like">

                                <svg class="icon-heart" viewBox="0 0 24 24" width="20" height="20">
                                    <path
                                        d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z" />
                                </svg>
                                <span class="like-count">5</span>
                            </button>

                            <button class="btn-comentario-aba">
                                <img src="" alt="Comentários">
                                <span class="comment-count">2</span>
                            </button>
                        </div>
                    </div>

                    <p class="detalhes">Quantidade: 1 | Tempo: 5 min | Preço: R$ 12.00</p>

                    <div class="acoes-botoes">
                        <button class="btn-acao">Favoritar</button>
                        <button class="btn-acao">Avaliar</button>
                        <button class="btn-acao btn-pedir-item">Pedir</button>
                    </div>
                    <div class="sessao-comentarios hide">
                        <div class="lista-comentarios-realizados">
                            <p><strong>daniel:</strong> otimo café</p>
                        </div>
                        <div class="wrapper-envio-comentario">
                            <input type="text" class="input-comentario" placeholder="Escrever um comentário...">
                            <button class="btn-enviar-comentario"><img src="" alt="Enviar"></button>
                        </div>
                        <span class="error-msg-comentario"></span>
                    </div>
                </article>
            </section>

            <footer class="paginacao">
                <button class="btn-pag" id="pag-anterior">Anterior</button>
                <div id="numeros-paginas">
                    <button class="btn-num active">1</button>
                    <button class="btn-num">2</button>
                </div>
                <button class="btn-pag" id="pag-proximo">Próximo</button>
            </footer>

        </main>
    </div>

</body>

</html>
